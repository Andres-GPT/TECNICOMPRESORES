<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/maquinas_pendientes_revision.css">
    <script src="js/config.js"></script>
    <title>Máquinas Pendientes de Revisión - Tecnicompresores</title>
</head>

<body>
    <header>
        <div class="header-content">
            <div id="logo" onclick="location.href='index.html'">
                <img src="img/logo.png" alt="Logo">
                <span>TECNICOMPRESORES DEL NORTE SAS</span>
            </div>
            <nav>
                <a href="index.html">Inicio</a>
                <a href="registro.html">Registro</a>
                <a href="maquinas.html" class="active">Máquinas</a>
                <a href="configurar_recibo.html">Configuración</a>
                <a href="tecnicos.html">Técnicos</a>
            </nav>
        </div>
    </header>

    <div class="container">

        <div class="titulo">
            <h1>Máquinas pendientes por revisión</h1>
        </div>

        <div class="filtros">
            <h3 class="filtros-title">Filtros</h3>
            <div class="filtros-grid">
                <div class="filtro-group">
                    <label for="cedula">Documento</label>
                    <form id="formCedula">
                        <input placeholder="Ingrese el documento" type="text" id="cedula">
                    </form>
                </div>

                <div class="filtro-group">
                    <label for="nombre">Nombre</label>
                    <form id="formNombre">
                        <input placeholder="Ingrese el nombre" type="text" id="nombre">
                    </form>
                </div>

                <div class="filtro-group">
                    <label for="fecha">Fecha</label>
                    <input type="date" id="fecha">
                </div>
            </div>
        </div>

        <table class="table-custom">
            <thead>
                <tr>
                    <th scope="col">Documento</th>
                    <th scope="col">Nombre</th>
                    <th scope="col">Descripción</th>
                    <th scope="col">Observaciones</th>
                    <th scope="col">Fecha</th>
                    <th scope="col">Generar Recibo</th>
                </tr>
            </thead>
            <tbody>

            </tbody>
        </table>

    </div>
</body>
<script src="js/maquinas_pendientes_revision.js"></script>

</html>

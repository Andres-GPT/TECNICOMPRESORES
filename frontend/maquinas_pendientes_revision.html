<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/maquinas_pendientes_revision.css">
    <script src="js/config.js"></script>
    <title>Tecnicompresores</title>
</head>

<body>
    <header>
        <div id="logo">
            <img src="img/logo.png" alt="Logo">
            <span>TECNICOMPRESORES DEL NORTE SAS</span>
        </div>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="registro.html">Registro</a>
            <a href="#">Máquinas</a>
        </nav>
    </header>

    <div class="container">

        <div class="titulo">
            <h1>Maquinas Pendientes por Revisión</h1>
        </div>

        <div class="filtros">
            <h3>Filtros</h3>
            <h4>Cédula</h4>
            <input placeholder="Ingrese el ID de un Usuario" type="text" id="idUsuario">
            <h4>Nombre</h4>
            <input placeholder="Ingrese el Nombre de un Usuario" type="text" id="nombreUsuario">
            <h4>Fecha</h4>
            <input placeholder="Ingrese el Nombre de un Usuario" type="date" id="nombreUsuario">
            <button onclick="filtro()" type="button">Buscar</button>
        </div>

        <table class="table-custom">
            <thead>
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">Cédula</th>
                    <th scope="col">Nombre</th>
                    <th scope="col">Apellido</th>
                    <th scope="col">Descripción</th>
                    <th scope="col">Observaciones</th>
                    <th scope="col">Fecha</th>
                </tr>
            </thead>
            <tbody>

            </tbody>
        </table>

    </div>
</body>
<script src="js/maquinas_pendientes_revision.js"></script>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/maquinas_terminadas.css">
    <script src="js/config.js"></script>
    <title>Tecnicompresores</title>
</head>

<body>
    <header>
        <div id="logo" onclick="location.href='index.html'" style="cursor: pointer;">
            <img src="img/logo.png" alt="Logo">
            <span>TECNICOMPRESORES DEL NORTE SAS</span>
        </div>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="registro.html">Registro</a>
            <a href="maquinas.html">Máquinas</a>
            <a href="configurar_recibo.html">Configuración</a>
            <a href="tecnicos.html">Técnicos</a>
        </nav>
    </header>

    <div class="container">

        <div class="titulo">
            <h1>Máquinas terminadas</h1>
        </div>

        <div class="filtros">
            <h3 class="tituloFiltros">Filtros</h3>
            <div>
                <h4 class="tituloFiltros">Documento</h4>
                <div class="container-filtros">
                    <form id="formCedula">
                        <input placeholder="Ingrese el documento" type="text" id="cedula">
                    </form>
                </div>

            </div>

            <div>
                <h4 class="tituloFiltros">Nombre</h4>
                <div class="container-filtros">
                    <form id="formNombre">
                        <input placeholder="Ingrese el nombre" type="text" id="nombre">
                    </form>
                </div>

            </div>
            <div>
                <h4 class="tituloFiltros">Fecha</h4>
                <div class="container-filtros">
                    <div>
                        <input type="date" id="fecha">
                    </div>

                </div>

            </div>
        </div>

        <table class="table-custom">
            <thead>
                <tr>
                    <th scope="col">Documento</th>
                    <th scope="col">Nombre</th>
                    <th scope="col">Apellido</th>
                    <th scope="col">Descripción</th>
                    <th scope="col">Procedimiento</th>
                    <th scope="col">Fecha</th>
                    <th scope="col">Acción</th>
                </tr>
            </thead>
            <tbody>

            </tbody>
        </table>

    </div>

    <!-- Modal de Confirmación -->
    <div id="modal-confirmacion" class="modal">
        <div class="modal-content">
            <h2>Confirmación</h2>
            <p id="modal-mensaje"></p>
            <button id="modal-cerrar">Aceptar</button>
        </div>
    </div>

    <style>
        /* Estilos para el modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            border: solid 1px #000000;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            width: 300px;
        }

        .modal-content button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px;
            margin-top: 10px;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</body>
<script src="js/maquinas_terminadas.js"></script>

</html>

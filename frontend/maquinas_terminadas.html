<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/maquinas_pendientes_revision.css">
    <script src="js/config.js"></script>
    <title>Tecnicompresores</title>
</head>

<body>
    <header>
        <div id="logo" onclick="location.href='index.html'" style="cursor: pointer;">
            <img src="img/logo.png" alt="Logo">
            <span>TECNICOMPRESORES DEL NORTE SAS</span>
        </div>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="registro.html">Registro</a>
            <a href="maquinas.html">Máquinas</a>
            <a href="configurar_recibo.html">Configuración</a>
        </nav>
    </header>

    <div class="container">

        <div class="titulo">
            <h1>Máquinas terminadas</h1>
        </div>

        <div class="filtros">
            <h3 class="tituloFiltros">Filtros</h3>
            <h4 class="tituloFiltros">Cédula</h4>
            <form id="formCedula">
                <input placeholder="Ingrese la Cédula" type="text" id="cedula">
                <button onclick="filtroCedula()" type="button">Buscar</button>
            </form>
            <h4 class="tituloFiltros">Fecha</h4>
            <input type="date" id="fecha">
            <button onclick="filtroFecha()" type="button">Buscar</button>
        </div>

        <table class="table-custom">
            <thead>
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">Cédula</th>
                    <th scope="col">Nombre</th>
                    <th scope="col">Apellido</th>
                    <th scope="col">Descripción</th>
                    <th scope="col">Observaciones</th>
                    <th scope="col">Fecha</th>
                </tr>
            </thead>
            <tbody>

            </tbody>
        </table>

    </div>
</body>
<script src="js/maquinas_terminadas.js"></script>

</html>

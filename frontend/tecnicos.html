<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/tecnicos.css">
    <script src="js/config.js"></script>
    <title>Gestión de Técnicos - Tecnicompresores</title>
</head>

<body>
    <header>
        <div class="header-content">
            <div id="logo" onclick="location.href='index.html'">
                <img src="img/logo.png" alt="Logo">
                <span>TECNICOMPRESORES DEL NORTE SAS</span>
            </div>
            <nav>
                <a href="index.html">Inicio</a>
                <a href="registro.html">Registro</a>
                <a href="maquinas.html">Máquinas</a>
                <a href="configurar_recibo.html">Configuración</a>
                <a href="tecnicos.html" class="active">Técnicos</a>
            </nav>
        </div>
    </header>

    <div class="container">

        <div id="title">
            <h1 class="title">Técnicos</h1>
            <button class="btn btn-secondary" onclick="location.href='crear_tecnico.html'">Agregar Técnico</button>
        </div>

        <div class="filtros">
            <h3 class="filtros-title">Filtros</h3>
            <div class="filtros-grid">
                <div class="filtro-group">
                    <label for="cedula">Cédula</label>
                    <form id="formCedula">
                        <input placeholder="Ingrese la Cédula" type="text" id="cedula">
                    </form>
                </div>
                <div class="filtro-group">
                </div>
            </div>
        </div>

        <table class="table-custom">
            <thead>
                <tr>
                    <th scope="col">Cédula</th>
                    <th scope="col">Nombre</th>
                    <th scope="col">Apellido</th>
                    <th scope="col">Telefono</th>
                </tr>
            </thead>
            <tbody>

            </tbody>
        </table>

    </div>

</body>
<script src="js/tecnicos.js"></script>

</html>

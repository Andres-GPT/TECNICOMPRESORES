<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/clientes.css">
    <script src="js/config.js"></script>
    <title>Gestión de Clientes - Tecnicompresores</title>
</head>

<body>
    <header>
        <div class="header-content">
            <div id="logo" onclick="location.href='index.html'">
                <img src="img/logo.png" alt="Logo">
                <span>TECNICOMPRESORES DEL NORTE SAS</span>
            </div>
            <nav>
                <a href="index.html">Inicio</a>
                <a href="registro.html">Registro</a>
                <a href="maquinas.html">Máquinas</a>
                <a href="configurar_recibo.html">Configuración</a>
                <a href="tecnicos.html">Técnicos</a>
                <a href="clientes.html" class="active">Clientes</a>
            </nav>
        </div>
    </header>

    <div class="container">

        <div id="title">
            <h1 class="title">Clientes Registrados</h1>
            <button class="btn btn-secondary" onclick="location.href='registro.html'">Agregar Cliente</button>
        </div>

        <div class="filtros">
            <h3 class="filtros-title">Búsqueda</h3>
            <div class="filtros-grid">
                <div class="filtro-group">
                    <label for="search">Buscar por Cédula, Nombre o Apellido</label>
                    <input placeholder="Ingrese el término de búsqueda" type="text" id="search">
                </div>
            </div>
        </div>

        <table class="table-custom">
            <thead>
                <tr>
                    <th scope="col">Documento</th>
                    <th scope="col">Nombre</th>
                    <th scope="col">Apellido</th>
                    <th scope="col">Teléfono</th>
                    <th scope="col">Correo</th>
                </tr>
            </thead>
            <tbody id="clientes-tbody">
                <!-- Se llenará dinámicamente -->
            </tbody>
        </table>

        <div class="pagination-container">
            <button id="btn-prev" class="btn btn-ghost">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M10 12l-4-4 4-4v8z"/>
                </svg>
                Anterior
            </button>
            
            <div id="page-numbers" class="page-numbers">
                <!-- Se llenará dinámicamente -->
            </div>
            
            <button id="btn-next" class="btn btn-ghost">
                Siguiente
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M6 4l4 4-4 4V4z"/>
                </svg>
            </button>
        </div>

        <div id="pagination-info" class="pagination-info">
            <!-- Se llenará dinámicamente -->
        </div>

    </div>

</body>
<script src="js/clientes.js"></script>

</html>

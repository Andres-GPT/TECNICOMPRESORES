<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/revision_maquina.css">
    <script src="js/config.js"></script>
    <title>Tecnicompresores</title>
</head>

<body>
    <header>
        <div id="logo" onclick="location.href='index.html'" style="cursor: pointer;">
            <img src="img/logo.png" alt="Logo">
            <span>TECNICOMPRESORES DEL NORTE SAS</span>
        </div>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="registro.html">Registro</a>
            <a href="maquinas.html">Máquinas</a>
        </nav>
    </header>

    <div class="container">

        <div class="titulo">
            <h1>Revisión de la máquina</h1>
        </div>

        <form action="" id="form-register">
            <div class="form-container">
                <div class="form-section">
                    <h3>Datos del Cliente</h3>
                    <div class="form-group">
                        <label for="cedula">Cédula</label>
                        <input type="text" id="cedula" name="cedula" oninput="obtenerCliente(this.value)">
                    </div>

                    <div class="form-group">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" name="nombre" required>
                    </div>
                    <div class="form-group">
                        <label for="apellido">Apellido</label>
                        <input type="text" id="apellido" name="apellido" required>
                    </div>
                    <div class="form-group">
                        <label for="telefono">Teléfono</label>
                        <input type="number" id="telefono" name="telefono" required>
                        <small id="telefono-error" style="color: red; display: none;">Máximo 10 dígitos</small>
                    </div>
                    <div class="form-group">
                        <label for="correo">Correo</label>
                        <input type="email" id="correo" name="correo">
                    </div>
                    <div class="form-group">
                        <label for="direccion">Dirección</label>
                        <input type="text" id="direccion" name="direccion" required>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Datos de la Máquina</h3>
                    <div class="form-group">
                        <label for="descripcion">Descripción</label>
                        <textarea id="descripcion" name="descripcion"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="observaciones">Observaciones</label>
                        <textarea id="observaciones" name="observaciones"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="descripcion_procedimiento">Descripción del procedimiento</label>
                        <textarea id="descripcion_procedimiento" name="descripcion_procedimiento"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="costo_revision">Costo de la revisión</label>
                        <input type="number" id="costo_revision" name="costo_revision">
                    </div>
                    <div class="form-group">
                        <label for="costo_procedimiento">Costo del procedimiento</label>
                        <input type="number" id="costo_procedimiento" name="costo_procedimiento">
                    </div>
                </div>
            </div>

            <div class="button-container">
                <button type="submit" id="btn-cancelar">Aceptar</button>
            </div>
        </form>

    </div>
</body>
<script src="js/revision_de_maquina.js"></script>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tecnicom</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        header {
            background-color: #2c2c2c;
            color: white;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header img {
            height: 50px;
        }

        nav {
            display: flex;
            gap: 1rem;
        }

        nav a {
            text-decoration: none;
            color: white;
            font-size: 1.1rem;
        }

        .container {
            padding: 2rem;
            position: relative;
        }

        .title {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .card {
            background-color: white;
            border: 2px solid #b30000;
            border-radius: 10px;
            text-align: center;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .card h3 {
            color: #b30000;
            margin: 0 0 0.5rem 0;
        }

        .card p {
            font-size: 1.5rem;
            font-weight: bold;
            color: #e6e600;
            margin: 0;
        }

        .history-button {
            margin-bottom: 1rem;
            padding: 0.5rem 1rem;
            background-color: #ccc;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .history-button:hover {
            background-color: #bbb;
        }
    </style>
</head>
<body>
    <header>
        <div>
            <img src="logo.png" alt="Logo">
            <span>TECNICOMPRESORES DEL NORTE SAS</span>
        </div>
        <nav>
            <a href="#">Inicio</a>
            <a href="#">Registro</a>
            <a href="#">Máquinas</a>
        </nav>
    </header>

    <div class="container">
        <button class="history-button">Historial de Máquinas</button>
        <h1 class="title">Inicio</h1>

        <div class="cards">
            <div class="card">
                <h3>Máquinas Pendientes por Revisión</h3>
                <p>#0</p>
            </div>
            <div class="card">
                <h3>Máquinas Pendientes por Confirmación</h3>
                <p>#0</p>
            </div>
            <div class="card">
                <h3>Máquinas en Proceso</h3>
                <p>#0</p>
            </div>
            <div class="card">
                <h3>Máquinas Pendientes por Recoger</h3>
                <p>#0</p>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/revision_maquina.css">
    <script src="js/config.js"></script>
    <title>Tecnicompresores</title>
</head>

<body>
    <header>
        <div id="logo" onclick="location.href='index.html'" style="cursor: pointer;">
            <img src="img/logo.png" alt="Logo">
            <span>TECNICOMPRESORES DEL NORTE SAS</span>
        </div>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="registro.html">Registro</a>
            <a href="maquinas.html">Máquinas</a>
            <a href="configurar_recibo.html">Configuración</a>
            <a href="tecnicos.html">Técnicos</a>
        </nav>
    </header>

    <div class="container">

        <div class="titulo">
            <h1>Configurar Recibo</h1>
        </div>

        <form action="" id="form-register">
            <div class="form-container">
                <div class="form-section">
                    <h3>Leyenda</h3>
                    <div class="form-group">
                        <textarea name="leyenda" id="leyenda"></textarea>
                    </div>
                </div>
                <div class="form-section">
                    <h3>Logo</h3>
                    <div class="form-group2">
                        <input type="file" id="logo-recibo" name="logo-recibo" accept="image/*"
                            style="opacity: 0; position: absolute; width: 100%; height: 100%; cursor: pointer;">
                        <img id="preview-image" src="" alt="Seleccionar logo"
                            style="max-width: 150px; cursor: pointer;">
                    </div>
                </div>
            </div>

            <div class="button-container">
                <button type="button" id="btn-aceptar">Aceptar</button>
                <button type="button" id="btn-cancelar">Atrás</button>
            </div>
        </form>

    </div>
</body>
<script src="js/configurar_recibo.js"></script>

</html>

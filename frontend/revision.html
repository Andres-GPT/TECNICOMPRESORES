<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/revision.css">
    <title>Tecnicompresores</title>
</head>

<body>
    <header>
        <div id="logo">
            <img src="img/logo.png" alt="Logo">
            <span>TECNICOMPRESORES DEL NORTE SAS</span>
        </div>
        <nav>
            <a href="#">Inicio</a>
            <a href="#">Registro</a>
            <a href="#">Máquinas</a>
        </nav>
    </header>

    <div class="container">
        <div>
            <h1 class="title">Revisión de la Máquina</h1>
        </div>
        <form>
            <div class="form-container">
                <h2>Datos de la Máquina</h2>
                <label for="descripcion-maquina">Descripción de la Máquina</label>
                <textarea id="descripcion-maquina" name="descripcion-maquina" rows="4"></textarea>

                <label for="observaciones-cliente">Observaciones del Cliente</label>
                <textarea id="observaciones-cliente" name="observaciones-cliente" rows="4"></textarea>

                <label for="descripcion-procedimiento">Descripción del Procedimiento</label>
                <textarea id="descripcion-procedimiento" name="descripcion-procedimiento" rows="4"></textarea>
            </div>

            <button type="submit" class="btn-aceptar">Aceptar</button>

        </form>
    </div>
</body>

</html>

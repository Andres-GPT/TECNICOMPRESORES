<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/revision_maquina.css">
    <script src="js/config.js"></script>
    <script src="js/ui-utils.js"></script>
    <title>Tecnicompresores</title>
</head>

<body>
    <header>
        <div id="logo" onclick="location.href='index.html'" style="cursor: pointer;">
            <img src="img/logo.png" alt="Logo">
            <span>TECNICOMPRESORES DEL NORTE SAS</span>
        </div>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="registro.html">Registro</a>
            <a href="maquinas.html">Máquinas</a>
            <a href="configurar_recibo.html">Configuración</a>
            <a href="tecnicos.html">Técnicos</a>
        </nav>
    </header>

    <div class="container">

        <div class="titulo">
            <h1>Confirmar Entrega</h1>
        </div>

        <form action="" id="form-register">
            <div class="form-container">
                <div class="form-section">
                    <h3>Datos del Cliente</h3>
                    <div class="form-group">
                        <label for="cedula">Documento</label>
                        <input type="text" id="cedula" name="cedula" oninput="obtenerCliente(this.value)">
                        <small id="cedula-error" style="color: red; display: none;">El cliente ya existe</small>
                    </div>

                    <div class="form-group">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" name="nombre">
                    </div>

                    <div class="form-group">
                        <label for="telefono">Teléfono</label>
                        <input type="text" id="telefono" name="telefono">
                    </div>
                    <div class="form-group">
                        <label for="correo">Correo</label>
                        <input type="email" id="correo" name="correo">
                    </div>
                    <div class="form-group">
                        <label for="direccion">Dirección</label>
                        <input type="text" id="direccion" name="direccion">
                    </div>
                    <div class="form-group">
                        <label for="notas">Notas</label>
                        <textarea id="notas" name="notas"></textarea>
                        <small id="notas-error" style="color: red; display: none;">Máximo 255 caracteres</small>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Datos de la Máquina</h3>
                    <div class="form-group">
                        <label for="descripcion">Descripción</label>
                        <textarea id="descripcion" name="descripcion"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="observaciones">Observaciones</label>
                        <textarea id="observaciones" name="observaciones"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="descripcion_procedimiento">Descripción del procedimiento</label>
                        <textarea id="descripcion_procedimiento" name="descripcion_procedimiento"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="costo_revision">Costo de la revisión</label>
                        <input type="number" id="costo_revision" name="costo_revision">
                    </div>
                    <div class="form-group">
                        <label for="costo_procedimiento">Costo del procedimiento</label>
                        <input type="number" id="costo_procedimiento" name="costo_procedimiento">
                    </div>
                </div>
            </div>

            <div class="button-container">
                <button type="submit" id="btn-entregar">Entregado</button>
                <button type="submit" id="btn-noEntregar">Guardar Nota</button>
                <button type="button" id="btn-atras" onclick="window.history.back()">Atrás</button>
            </div>
            
        </form>

    </div>

</body>
<script src="js/confirmar_entrega.js"></script>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/crear_tecnico.css">
    <script src="js/config.js"></script>
    <title>Editar Cliente - Tecnicompresores</title>
</head>

<body>
    <header>
        <div class="header-content">
            <div id="logo" onclick="location.href='index.html'">
                <img src="img/logo.png" alt="Logo">
                <span>TECNICOMPRESORES DEL NORTE SAS</span>
            </div>
            <nav>
                <a href="index.html">Inicio</a>
                <a href="registro.html">Registro</a>
                <a href="maquinas.html">Máquinas</a>
                <a href="configurar_recibo.html">Configuración</a>
                <a href="tecnicos.html">Técnicos</a>
                <a href="clientes.html" class="active">Clientes</a>
            </nav>
        </div>
    </header>

    <div class="container">

        <div class="titulo">
            <h1>Editar Cliente</h1>
        </div>

        <form action="" id="form-register">
            <div class="form-container">
                <div class="form-section">
                    <h3>Datos del Cliente</h3>
                    <div class="form-group">
                        <label for="cedula">Documento</label>
                        <input type="text" id="cedula" name="cedula" required readonly>
                        <small id="cedula-error" style="color: red; display: none;">Máximo 20 dígitos</small>
                    </div>
                    <div class="form-group">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" name="nombre" required>
                        <small id="nombre-error" style="color: red; display: none;">Máximo 30 caracteres</small>
                        <small id="nombre-error-letras" style="color: red; display: none;">Solo letras</small>
                    </div>

                    <div class="form-group">
                        <label for="telefono">Teléfono</label>
                        <input type="text" id="telefono" name="telefono">
                        <small id="telefono-error" style="color: red; display: none;">Máximo 15 dígitos</small>
                    </div>
                    <div class="form-group">
                        <label for="correo">Correo</label>
                        <input type="email" id="correo" name="correo">
                        <small id="correo-error" style="color: red; display: none;">Correo inválido</small>
                    </div>
                    <div class="form-group">
                        <label for="direccion">Dirección</label>
                        <input type="text" id="direccion" name="direccion">
                        <small id="direccion-error" style="color: red; display: none;">Máximo 100 caracteres</small>
                    </div>
                </div>
            </div>

            <div class="button-container">
                <button type="button" class="btn btn-secondary" onclick="location.href='clientes.html'">Atrás</button>
                <button type="submit" id="btn-aceptar" class="btn btn-primary">Guardar Cambios</button>
                <button type="submit" id="btn-eliminar" class="btn btn-outline">Eliminar</button>
            </div>
        </form>

    </div>
    <!-- Modal de Confirmación -->
    <div id="modal-confirmacion" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Confirmación</h2>
            </div>
            <div class="modal-body">
                <p id="modal-mensaje"></p>
            </div>
            <div class="modal-footer">
                <button id="modal-cerrar" class="btn btn-primary">Aceptar</button>
            </div>
        </div>
    </div>
</body>
<script src="js/editar_cliente.js"></script>

</html>

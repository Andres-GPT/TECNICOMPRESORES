<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/maquinas_en_proceso.css">
    <script src="js/config.js"></script>
    <title>Tecnicompresores</title>
</head>

<body>
    <header>
        <div id="logo" onclick="location.href='index.html'" style="cursor: pointer;">
            <img src="img/logo.png" alt="Logo">
            <span>TECNICOMPRESORES DEL NORTE SAS</span>
        </div>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="registro.html">Registro</a>
            <a href="maquinas.html">Máquinas</a>
            <a href="configurar_recibo.html">Configuración</a>
            <a href="tecnicos.html">Técnicos</a>
        </nav>
    </header>

    <div class="container">

        <div class="titulo">
            <h1>Máquinas en proceso</h1>
        </div>

        <div class="filtros">
            <h3 class="tituloFiltros">Filtros</h3>
            <div>
                <h4 class="tituloFiltros">Documento</h4>
                <div class="container-filtros">
                    <form id="formCedula">
                        <input placeholder="Ingrese el documento" type="text" id="cedula">
                    </form>
                </div>

            </div>

            <div>
                <h4 class="tituloFiltros">Nombre</h4>
                <div class="container-filtros">
                    <form id="formNombre">
                        <input placeholder="Ingrese el nombre" type="text" id="nombre">
                    </form>
                </div>

            </div>
            <div>
                <h4 class="tituloFiltros">Fecha</h4>
                <div class="container-filtros">
                    <div>
                        <input type="date" id="fecha">
                    </div>

                </div>

            </div>
        </div>
        <div class="filtros-2">
            <!-- Nuevo checkbox para garantía -->
            <h4 class="tituloFiltros">Garantía</h4>
            <label>
                <input type="checkbox" id="filtroGarantia"> Mostrar solo con garantía
            </label>

        </div>

        <table class="table-custom">
            <thead>
                <tr>
                    <th scope="col">Documento</th>
                    <th scope="col">Nombre</th>
                    <th scope="col">Apellido</th>
                    <th scope="col">Descripción</th>
                    <th scope="col">Procedimiento</th>
                    <th scope="col">Garantía</th>
                    <th scope="col">Fecha</th>
                    <th scope="col">Accion</th>
                </tr>
            </thead>
            <tbody>

            </tbody>
        </table>

    </div>

    <!-- Modal -->
    <div id="modalEstanteNivel" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Confirmar Registro</h2>
            <div class="div-input">
                <label for="inputEstante">Estante:</label>
                <input class="input" type="number" id="inputEstante" placeholder="Ingrese el estante">
                <small id="inputEstante-error" style="color: red; display: none;">Máximo 10 dígitos</small>
            </div>
            <div class="div-input">
                <label for="inputNivel">Nivel:</label>
                <input class="input" type="number" id="inputNivel" placeholder="Ingrese el nivel">
                <small id="inputNivel-error" style="color: red; display: none;">Máximo 10 dígitos</small>
            </div>
            <button class="btnModal" id="btnConfirmar">Confirmar</button>
        </div>
    </div>

    <style>
        /* Estilos básicos para el modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 10;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background: #fff;
            margin: 10% auto;
            padding: 20px;
            width: 300px;
            text-align: center;
            border-radius: 8px;
        }

        .close {
            float: right;
            font-size: 22px;
            cursor: pointer;
        }
    </style>

</body>
<script src="js/maquinas_en_proceso.js"></script>

</html>

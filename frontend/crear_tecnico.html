<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/crear_tecnico.css">
    <script src="js/config.js"></script>
    <title>Tecnicompresores</title>
</head>

<body>
    <header>
        <div id="logo" onclick="location.href='index.html'" style="cursor: pointer;">
            <img src="img/logo.png" alt="Logo">
            <span>TECNICOMPRESORES DEL NORTE SAS</span>
        </div>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="registro.html">Registro</a>
            <a href="maquinas.html">Máquinas</a>
            <a href="configurar_recibo.html">Configuración</a>
            <a href="tecnicos.html">Técnicos</a>
        </nav>
    </header>

    <div class="container">

        <div class="titulo">
            <h1>Crear Técnico</h1>
        </div>

        <form action="" id="form-register">
            <div class="form-container">
                <div class="form-section">
                    <h3>Datos del Técnico</h3>
                    <div class="form-group">
                        <label for="cedula">Cédula</label>
                        <input type="number" id="cedula" name="cedula"required>
                        <small id="cedula-error" style="color: red; display: none;">Máximo 11 dígitos</small>
                    </div>
                    <div class="form-group">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" name="nombre" required>
                    </div>
                    <div class="form-group">
                        <label for="apellido">Apellido</label>
                        <input type="text" id="apellido" name="apellido" required>
                    </div>
                    <div class="form-group">
                        <label for="telefono">Teléfono</label>
                        <input type="number" id="telefono" name="telefono" required>
                        <small id="telefono-error" style="color: red; display: none;">Máximo 10 dígitos</small>
                    </div>                    
                </div>
            </div>

            <div class="button-container">
                <button type="submit" id="btn-aceptar">Crear</button>
            </div>
        </form>

    </div>
    <!-- Modal de Confirmación -->
    <div id="modal-confirmacion" class="modal">
        <div class="modal-content">
            <h2>Confirmación</h2>
            <p id="modal-mensaje"></p>
            <button id="modal-cerrar">Aceptar</button>
        </div>
    </div>

    <style>
        /* Estilos para el modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            border: solid 1px #000000;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            width: 300px;
        }

        .modal-content button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px;
            margin-top: 10px;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</body>
<script src="js/crear_tecnico.js"></script>

</html>
